<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>撿貨播報小工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 12px;
}
h1 {
  text-align: center;
  color: #64b5f6;
  font-size: 1.5rem;
  margin-bottom: 12px;
}
.container {
  max-width: 800px;
  margin: 0 auto;
}

/* 區塊 */
.section {
  background: #16213e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid #0f3460;
}
.section-title {
  color: #64b5f6;
  font-size: 1rem;
  font-weight: bold;
  margin-bottom: 10px;
}

/* 輸入區 */
textarea {
  width: 100%;
  height: 180px;
  background: #0d1b3e;
  color: #e0e0e0;
  border: 1px solid #1a4a8a;
  border-radius: 8px;
  padding: 10px;
  font-size: 0.95rem;
  font-family: inherit;
  resize: vertical;
}
textarea:focus { outline: none; border-color: #64b5f6; }

/* 設定列 */
.settings-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.setting-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.setting-item label {
  font-size: 0.85rem;
  color: #90caf9;
  white-space: nowrap;
}
select, input[type="range"] {
  background: #0d1b3e;
  color: #e0e0e0;
  border: 1px solid #1a4a8a;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 0.85rem;
}
input[type="range"] { width: 100px; }

/* 模式選擇 */
.mode-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.mode-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.95rem;
  border: 2px solid #1a4a8a;
  background: #0d1b3e;
  color: #90caf9;
  transition: all 0.2s;
}
.mode-tab.active {
  background: #1a4a8a;
  color: #fff;
  border-color: #64b5f6;
}
.mode-tab:hover { border-color: #64b5f6; }

/* 員工分組 */
.worker-split {
  display: none;
  margin-top: 10px;
}
.worker-split.show { display: block; }
.worker-group {
  background: #0d1b3e;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
  border-left: 4px solid #64b5f6;
}
.worker-group.b { border-left-color: #ffa726; }
.worker-group h4 { font-size: 0.9rem; margin-bottom: 6px; }
.worker-group h4.a-label { color: #64b5f6; }
.worker-group h4.b-label { color: #ffa726; }
.store-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.store-chip {
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 0.8rem;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.store-chip.a {
  background: #1a3a6a;
  color: #90caf9;
  border: 1px solid #2a5a9a;
}
.store-chip.b {
  background: #3e2a0d;
  color: #ffcc80;
  border: 1px solid #6a4a1a;
}
.store-chip:hover { opacity: 0.8; }
.worker-select-hint {
  font-size: 0.8rem;
  color: #888;
  margin-bottom: 8px;
}

/* 播放控制 */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-play { background: #2e7d32; color: #fff; }
.btn-play:hover:not(:disabled) { background: #388e3c; }
.btn-pause { background: #f57f17; color: #fff; }
.btn-pause:hover:not(:disabled) { background: #f9a825; }
.btn-stop { background: #c62828; color: #fff; }
.btn-stop:hover:not(:disabled) { background: #d32f2f; }
.btn-skip { background: #1565c0; color: #fff; }
.btn-skip:hover:not(:disabled) { background: #1976d2; }
.btn-parse { background: #6a1b9a; color: #fff; }
.btn-parse:hover { background: #7b1fa2; }

/* 語音控制 */
.voice-control {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}
.mic-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid #c62828;
  background: #1a1a2e;
  color: #ef5350;
  font-size: 1.3rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mic-btn.listening {
  background: #c62828;
  color: #fff;
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0.5); }
  50% { box-shadow: 0 0 0 12px rgba(198, 40, 40, 0); }
}
.voice-status {
  font-size: 0.8rem;
  color: #888;
}

/* 播報顯示 */
.now-playing {
  text-align: center;
  padding: 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.now-product {
  font-size: 1.8rem;
  font-weight: bold;
  color: #ffd54f;
  margin-bottom: 8px;
}
.now-store {
  font-size: 1.4rem;
  color: #81c784;
}
.now-progress {
  font-size: 0.85rem;
  color: #888;
  margin-top: 8px;
}
.idle-msg {
  color: #666;
  font-size: 1rem;
}

/* 解析預覽 */
.preview-list {
  max-height: 300px;
  overflow-y: auto;
}
.preview-item {
  padding: 8px 10px;
  border-bottom: 1px solid #1a3a6a;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.preview-item:last-child { border-bottom: none; }
.preview-item.current {
  background: #1a3a6a;
  border-radius: 6px;
}
.preview-name {
  font-weight: bold;
  color: #ffd54f;
  min-width: 80px;
}
.preview-stores {
  font-size: 0.85rem;
  color: #aaa;
}

/* 雙人模式選擇 */
.worker-choose {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}
.worker-btn {
  padding: 8px 24px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.worker-btn.a-btn {
  background: #1a3a6a;
  color: #90caf9;
  border-color: #2a5a9a;
}
.worker-btn.a-btn.chosen {
  background: #2a5a9a;
  color: #fff;
  border-color: #64b5f6;
}
.worker-btn.b-btn {
  background: #3e2a0d;
  color: #ffcc80;
  border-color: #6a4a1a;
}
.worker-btn.b-btn.chosen {
  background: #6a4a1a;
  color: #fff;
  border-color: #ffa726;
}

/* RWD */
@media (max-width: 600px) {
  .now-product { font-size: 1.4rem; }
  .now-store { font-size: 1.2rem; }
  .btn { padding: 8px 14px; font-size: 0.9rem; }
  .settings-row { gap: 8px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>撿貨播報小工具</h1>

  <!-- 輸入區 -->
  <div class="section">
    <div class="section-title">撿貨清單</div>
    <div style="display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center;">
      <label class="btn" style="background:#0d47a1; color:#fff; cursor:pointer; display:inline-flex; align-items:center; gap:6px;">
        上傳檔案 (.txt / .csv / .xlsx / .xls)
        <input type="file" id="fileInput" accept=".txt,.csv,.xlsx,.xls" style="display:none;" onchange="handleFile(this)">
      </label>
      <span style="color:#666; font-size:0.85rem;">或直接在下方貼上文字</span>
    </div>
    <textarea id="inputText" placeholder="支援多種格式：

格式一（單行）：
吐司，中和15、文山20、中壢5

格式二（商品名+數量分兩行）：
新竹海瑞貢丸-原味貢丸 600g
三峽 16、中和 15、文山 15、永和 9

也支援上傳 Excel/CSV 表格檔案"></textarea>
    <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <button class="btn btn-parse" onclick="parseInput()">解析清單</button>
      <span id="parseStatus" style="font-size:0.85rem; color:#888;"></span>
    </div>
  </div>

  <!-- 模式 & 設定 -->
  <div class="section">
    <div class="section-title">播報設定</div>
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="single" onclick="setMode('single')">單人模式（全部店）</div>
      <div class="mode-tab" data-mode="dual" onclick="setMode('dual')">雙人模式（分A/B組）</div>
    </div>

    <!-- 雙人分組 -->
    <div class="worker-split" id="workerSplit">
      <div class="worker-select-hint">點擊店名可在 A/B 組之間切換</div>
      <div class="worker-group">
        <h4 class="a-label">A 員工</h4>
        <div class="store-chips" id="chipsA"></div>
      </div>
      <div class="worker-group b">
        <h4 class="b-label">B 員工</h4>
        <div class="store-chips" id="chipsB"></div>
      </div>
      <div class="worker-choose">
        <div class="section-title" style="margin:0; align-self:center;">我是：</div>
        <button class="worker-btn a-btn chosen" id="chooseA" onclick="chooseWorker('A')">A 員工</button>
        <button class="worker-btn b-btn" id="chooseB" onclick="chooseWorker('B')">B 員工</button>
      </div>
    </div>

    <div class="settings-row" style="margin-top:10px;">
      <div class="setting-item">
        <label>語速：</label>
        <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="0.9">
        <span id="speedVal" style="font-size:0.8rem; min-width:30px;">0.9</span>
      </div>
      <div class="setting-item">
        <label>聲音：</label>
        <select id="voiceSelect"></select>
      </div>
      <div class="setting-item">
        <label>間隔(秒)：</label>
        <input type="range" id="delayRange" min="0.3" max="3" step="0.1" value="0.8">
        <span id="delayVal" style="font-size:0.8rem; min-width:30px;">0.8</span>
      </div>
      <div class="setting-item">
        <label>每店重複：</label>
        <select id="repeatCount">
          <option value="1">1 次</option>
          <option value="2" selected>2 次</option>
          <option value="3">3 次</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 播放控制 -->
  <div class="section">
    <div class="section-title">播放控制</div>
    <div class="controls">
      <button class="btn btn-play" id="btnPlay" onclick="startPlay()" disabled>播放</button>
      <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>暫停</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopPlay()" disabled>停止</button>
      <button class="btn btn-skip" id="btnPrevStore" onclick="skipStore(-1)" disabled>上一店</button>
      <button class="btn btn-skip" id="btnNextStore" onclick="skipStore(1)" disabled>下一店</button>
      <button class="btn btn-skip" id="btnPrev" onclick="skipProduct(-1)" disabled>上一商品</button>
      <button class="btn btn-skip" id="btnNext" onclick="skipProduct(1)" disabled>下一商品</button>
    </div>
    <div class="voice-control">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="語音控制">&#127908;</button>
      <span class="voice-status" id="voiceStatus">點擊開啟語音控制（「停」暫停、「繼續」、「下一個/上一個」跳商品、「上一店/下一店」、「再念一次」重念）</span>
    </div>
  </div>

  <!-- 現在播報 -->
  <div class="section">
    <div class="section-title">目前播報</div>
    <div class="now-playing" id="nowPlaying">
      <div class="idle-msg">請先貼上清單並按「解析清單」</div>
    </div>
  </div>

  <!-- 清單預覽 -->
  <div class="section">
    <div class="section-title">清單預覽</div>
    <div class="preview-list" id="previewList">
      <div style="color:#666; padding:10px;">尚無資料</div>
    </div>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
// ===== 檔案上傳 =====
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'txt') {
    file.text().then(text => {
      document.getElementById('inputText').value = text;
      document.getElementById('parseStatus').textContent = `已載入 ${file.name}`;
      parseInput();
    });
  } else if (ext === 'csv' || ext === 'xlsx' || ext === 'xls') {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      handleSheet(ws);
      document.getElementById('parseStatus').textContent = `已載入 ${file.name}`;
    };
    reader.readAsArrayBuffer(file);
  }
  input.value = '';
}

function handleSheet(ws) {
  // 用 SheetJS 直接讀取儲存格，避免 CSV 引號/換行問題
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const maxRow = range.e.r;
  const maxCol = range.e.c;

  function cellVal(r, c) {
    const addr = XLSX.utils.encode_cell({ r, c });
    const cell = ws[addr];
    return cell ? String(cell.v || '').replace(/\s+/g, '').trim() : '';
  }

  // 找含有「商品名稱」的標題列
  let headerRow = -1;
  for (let r = 0; r <= Math.min(5, maxRow); r++) {
    for (let c = 0; c <= maxCol; c++) {
      if (cellVal(r, c) === '商品名稱') { headerRow = r; break; }
    }
    if (headerRow >= 0) break;
  }

  if (headerRow >= 0) {
    // 找所有「商品名稱」欄位位置
    const nameColCandidates = [];
    for (let c = 0; c <= maxCol; c++) {
      if (cellVal(headerRow, c) === '商品名稱') nameColCandidates.push(c);
    }

    // 取第二段（撿貨後），如果只有一段就用第一段
    const nameCol = nameColCandidates.length >= 2 ? nameColCandidates[1] : nameColCandidates[0];

    // 從 nameCol 往後找「總數」
    let totalCol = -1;
    for (let c = nameCol + 1; c <= maxCol; c++) {
      if (cellVal(headerRow, c) === '總數') { totalCol = c; break; }
    }

    // 總數之後就是各店名
    const storeNames = [];
    const storeCols = [];
    const skipHeaders = ['剩餘','訂貨','結單日','商品編號','商品名稱','總數','回','出貨時間'];
    if (totalCol >= 0) {
      for (let c = totalCol + 1; c <= maxCol; c++) {
        const h = cellVal(headerRow, c);
        if (!h || skipHeaders.includes(h)) break;
        storeNames.push(h);
        storeCols.push(c);
      }
    }

    if (storeNames.length > 0) {
      const result = [];
      for (let r = headerRow + 1; r <= maxRow; r++) {
        const productName = cellVal(r, nameCol);
        if (!productName) continue;
        const stores = [];
        for (let j = 0; j < storeNames.length; j++) {
          const v = cellVal(r, storeCols[j]);
          const qty = parseInt(v);
          if (qty > 0) {
            stores.push(`${storeNames[j]}${qty}`);
          }
        }
        if (stores.length > 0) {
          result.push(`${productName}，${stores.join('、')}`);
        }
      }
      document.getElementById('inputText').value = result.join('\n');
      parseInput();
      return;
    }
  }

  // 一般表格格式：第一列當店名標題
  const storeNames = [];
  for (let c = 1; c <= maxCol; c++) {
    const h = cellVal(0, c);
    if (h && !/\d/.test(h)) storeNames.push({ name: h, col: c });
    else break;
  }

  if (storeNames.length > 0) {
    const result = [];
    for (let r = 1; r <= maxRow; r++) {
      const productName = cellVal(r, 0);
      if (!productName) continue;
      const stores = [];
      for (const s of storeNames) {
        const qty = parseInt(cellVal(r, s.col));
        if (qty > 0) stores.push(`${s.name}${qty}`);
      }
      if (stores.length > 0) result.push(`${productName}，${stores.join('、')}`);
    }
    document.getElementById('inputText').value = result.join('\n');
  } else {
    // 直接轉文字
    const csv = XLSX.utils.sheet_to_csv(ws);
    document.getElementById('inputText').value = csv;
  }
  parseInput();
}

// ===== 資料 =====
let parsedItems = [];  // [{name, stores: [{store, qty}]}]
let allStores = [];    // 所有不重複店名
let storeGroup = {};   // store -> 'A' | 'B'
let currentMode = 'single';
let chosenWorker = 'A';

// 播放狀態
let isPlaying = false;
let isPaused = false;
let currentProductIdx = 0;
let currentStoreIdx = 0;
let startFromStore = -1; // -1 = 從商品名開始, >=0 = 從指定店開始
let playTimer = null;
let playSessionId = 0; // 每次啟動播放遞增，用來讓舊迴圈自動停止

// 語音辨識
let recognition = null;
let isListening = false;

// ===== 解析 =====
function parseInput() {
  const raw = document.getElementById('inputText').value.trim();
  if (!raw) { document.getElementById('parseStatus').textContent = '請先輸入清單'; return; }

  parsedItems = [];
  allStores = new Set();

  // 先預處理：合併多行格式（商品名獨立一行，店家數量在下一行）
  const rawLines = raw.split('\n');
  const mergedLines = [];

  for (let i = 0; i < rawLines.length; i++) {
    const line = rawLines[i].trim();
    if (!line) continue;

    // 判斷這行是否為「純店家數量」（以 中文+數字 的組合開頭，用頓號分隔）
    const isStoreList = /^[\u4e00-\u9fff\w]+\s*\d+/.test(line) && /、/.test(line) && !/[，,]/.test(line.split('、')[0].replace(/\s*\d+$/, ''));

    // 如果上一行存在且這行看起來是純店家列表，就合併到上一行
    if (isStoreList && mergedLines.length > 0) {
      // 檢查上一行是否還沒有店家資訊（只有商品名）
      const prev = mergedLines[mergedLines.length - 1];
      const prevHasStores = /\d/.test(prev) && /[、，,]/.test(prev);
      if (!prevHasStores) {
        mergedLines[mergedLines.length - 1] = prev + '，' + line;
        continue;
      }
    }
    mergedLines.push(line);
  }

  for (const line of mergedLines) {
    // 分隔商品名和店家：用第一個全形或半形逗號
    const match = line.match(/^(.+?)[，,]+(.+)$/);
    if (!match) continue;
    const name = match[1].trim();
    const rest = match[2].trim();

    // 解析店家+數量：支援 中和15 或 中和 15，用頓號或逗號分隔
    const stores = [];
    const parts = rest.split(/[、,，]+/);
    for (const p of parts) {
      const m = p.trim().match(/^(.+?)\s*(\d+)$/);
      if (m) {
        stores.push({ store: m[1].trim(), qty: parseInt(m[2]) });
        allStores.add(m[1].trim());
      }
    }
    if (stores.length > 0) {
      parsedItems.push({ name, stores });
    }
  }

  allStores = [...allStores];

  // 預設分組：前半A、後半B
  const mid = Math.ceil(allStores.length / 2);
  storeGroup = {};
  allStores.forEach((s, i) => { storeGroup[s] = i < mid ? 'A' : 'B'; });

  document.getElementById('parseStatus').textContent = `已解析 ${parsedItems.length} 項商品、${allStores.length} 間店`;
  renderPreview();
  renderStoreChips();
  document.getElementById('btnPlay').disabled = parsedItems.length === 0;
}

// ===== 模式 =====
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('workerSplit').classList.toggle('show', mode === 'dual');
}

function chooseWorker(w) {
  chosenWorker = w;
  document.getElementById('chooseA').classList.toggle('chosen', w === 'A');
  document.getElementById('chooseB').classList.toggle('chosen', w === 'B');
}

// ===== 店家分組 chips =====
function renderStoreChips() {
  const chipsA = document.getElementById('chipsA');
  const chipsB = document.getElementById('chipsB');
  chipsA.innerHTML = '';
  chipsB.innerHTML = '';

  allStores.forEach(s => {
    const chip = document.createElement('span');
    chip.className = 'store-chip ' + (storeGroup[s] === 'A' ? 'a' : 'b');
    chip.textContent = s;
    chip.onclick = () => {
      storeGroup[s] = storeGroup[s] === 'A' ? 'B' : 'A';
      renderStoreChips();
    };
    if (storeGroup[s] === 'A') chipsA.appendChild(chip);
    else chipsB.appendChild(chip);
  });
}

// ===== 預覽 =====
function renderPreview() {
  const container = document.getElementById('previewList');
  if (parsedItems.length === 0) {
    container.innerHTML = '<div style="color:#666; padding:10px;">尚無資料</div>';
    return;
  }
  container.innerHTML = parsedItems.map((item, i) => {
    const storesStr = item.stores.map(s => `${s.store}${s.qty}`).join('、');
    return `<div class="preview-item${i === currentProductIdx && isPlaying ? ' current' : ''}" id="prev-${i}">
      <span class="preview-name">${item.name}</span>
      <span class="preview-stores">${storesStr}</span>
    </div>`;
  }).join('');
}

// ===== TTS =====
const synth = window.speechSynthesis;
let voices = [];

function loadVoices() {
  voices = synth.getVoices();
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // 篩選中文語音
  const zhVoices = voices.filter(v => /zh|cmn|chinese/i.test(v.lang));
  const displayVoices = zhVoices.length > 0 ? zhVoices : voices.slice(0, 10);

  displayVoices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = voices.indexOf(v);
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });

  // 若沒有中文，加入提示
  if (zhVoices.length === 0 && voices.length > 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '-- 未偵測到中文語音 --';
    sel.insertBefore(opt, sel.firstChild);
  }
}

synth.onvoiceschanged = loadVoices;
loadVoices();

document.getElementById('speedRange').oninput = function() {
  document.getElementById('speedVal').textContent = this.value;
};
document.getElementById('delayRange').oninput = function() {
  document.getElementById('delayVal').textContent = this.value;
};

function speak(text) {
  return new Promise(resolve => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = parseFloat(document.getElementById('speedRange').value);
    utter.pitch = 1;
    const voiceIdx = document.getElementById('voiceSelect').value;
    if (voiceIdx !== '' && voices[voiceIdx]) {
      utter.voice = voices[voiceIdx];
    }
    utter.onend = resolve;
    utter.onerror = resolve;
    synth.speak(utter);
  });
}

function delay(ms) {
  return new Promise(resolve => { playTimer = setTimeout(resolve, ms); });
}

// ===== 取得此商品要念的店家 =====
function getStoresForProduct(item) {
  if (currentMode === 'single') return item.stores;
  return item.stores.filter(s => storeGroup[s.store] === chosenWorker);
}

// ===== 播放 =====
async function startPlay() {
  if (parsedItems.length === 0) return;

  if (isPaused) {
    isPaused = false;
    synth.resume();
    updateButtons();
    return;
  }

  // 停掉舊的播放
  synth.cancel();
  clearTimeout(playTimer);

  isPlaying = true;
  isPaused = false;
  currentProductIdx = 0;
  currentStoreIdx = 0;
  startFromStore = -1;
  updateButtons();

  await playFromCurrent();
}

function restartPlay() {
  // 用於 skipStore / skipProduct：停掉舊迴圈再啟動新的
  synth.cancel();
  clearTimeout(playTimer);
  playSessionId++;
  isPlaying = true;
  isPaused = false;
  updateButtons();
  playFromCurrent();
}

async function playFromCurrent() {
  const mySession = ++playSessionId;
  const alive = () => isPlaying && playSessionId === mySession;
  const delayMs = () => parseFloat(document.getElementById('delayRange').value) * 1000;

  while (currentProductIdx < parsedItems.length && alive()) {
    const item = parsedItems[currentProductIdx];
    const stores = getStoresForProduct(item);

    renderPreview();

    // 如果不是從中途跳入的店家，先念商品名
    if (startFromStore < 0) {
      updateNowPlaying(item.name, '', `商品 ${currentProductIdx + 1} / ${parsedItems.length}`);
      await speak(item.name);
      if (!alive()) break;
      await delay(delayMs() * 0.5);
      if (!alive()) break;

      while (isPaused && alive()) { await delay(200); }
      if (!alive()) break;
    }

    if (stores.length === 0) {
      updateNowPlaying(item.name, '（本組無此商品）', `商品 ${currentProductIdx + 1} / ${parsedItems.length}`);
      await speak('本組無此商品');
      await delay(delayMs());
    } else {
      const repeatN = parseInt(document.getElementById('repeatCount').value) || 1;
      const siStart = startFromStore >= 0 ? startFromStore : 0;
      startFromStore = -1; // 用完重置

      for (let si = siStart; si < stores.length; si++) {
        currentStoreIdx = si;
        if (!alive()) break;
        while (isPaused && alive()) { await delay(200); }
        if (!alive()) break;

        const s = stores[si];
        const text = `${s.store}，${s.qty}`;
        for (let ri = 0; ri < repeatN; ri++) {
          if (!alive()) break;
          while (isPaused && alive()) { await delay(200); }
          if (!alive()) break;
          const repeatLabel = repeatN > 1 ? `（第${ri + 1}次）` : '';
          updateNowPlaying(item.name, `${s.store}  ${s.qty}  ${repeatLabel}`, `商品 ${currentProductIdx + 1}/${parsedItems.length}　店 ${si + 1}/${stores.length}`);
          await speak(text);
          if (!alive()) break;
          if (ri < repeatN - 1) await delay(delayMs() * 0.4);
        }
        if (!alive()) break;
        if (si < stores.length - 1) await delay(delayMs());
      }
    }

    if (!alive()) break;

    // 商品間隔
    if (currentProductIdx < parsedItems.length - 1) {
      await delay(delayMs());
      if (!alive()) break;
      updateNowPlaying('', '準備下一個商品...', '');
      await speak('下一個');
      await delay(delayMs() * 0.5);
    }

    currentProductIdx++;
    currentStoreIdx = 0;
  }

  // 只有當前 session 還有效時才做結束處理
  if (alive()) {
    updateNowPlaying('', '全部播報完成', '');
    await speak('全部播報完成');
    isPlaying = false;
    isPaused = false;
    updateButtons();
    renderPreview();
  }
}

function togglePause() {
  if (!isPlaying) return;
  if (isPaused) {
    isPaused = false;
    synth.resume();
  } else {
    isPaused = true;
    synth.pause();
  }
  updateButtons();
}

function stopPlay() {
  isPlaying = false;
  isPaused = false;
  synth.cancel();
  clearTimeout(playTimer);
  updateButtons();
  updateNowPlaying('', '已停止', '');
  renderPreview();
}

function skipProduct(dir) {
  if (parsedItems.length === 0) return;

  const newIdx = currentProductIdx + dir;
  if (newIdx < 0 || newIdx >= parsedItems.length) return;
  currentProductIdx = newIdx;
  currentStoreIdx = 0;
  startFromStore = -1;
  restartPlay();
}

function skipStore(dir) {
  if (parsedItems.length === 0) return;
  const item = parsedItems[currentProductIdx];
  if (!item) return;
  const stores = getStoresForProduct(item);

  // dir=0 表示重念當前店
  let newSi = dir === 0 ? currentStoreIdx : currentStoreIdx + dir;

  // 往前超過第一店 → 跳到上一個商品的最後一店
  if (newSi < 0) {
    if (currentProductIdx > 0) {
      currentProductIdx--;
      const prevStores = getStoresForProduct(parsedItems[currentProductIdx]);
      newSi = Math.max(0, prevStores.length - 1);
    } else {
      newSi = 0;
    }
  }
  // 往後超過最後一店 → 跳到下一個商品
  else if (newSi >= stores.length) {
    if (currentProductIdx < parsedItems.length - 1) {
      currentProductIdx++;
      currentStoreIdx = 0;
      startFromStore = -1; // 從商品名開始念
      restartPlay();
      return;
    } else {
      newSi = stores.length - 1;
    }
  }

  startFromStore = newSi;
  currentStoreIdx = newSi;
  restartPlay();
}

// ===== UI 更新 =====
function updateButtons() {
  const hasData = parsedItems.length > 0;
  document.getElementById('btnPlay').disabled = !hasData || (isPlaying && !isPaused);
  document.getElementById('btnPause').disabled = !isPlaying;
  document.getElementById('btnStop').disabled = !isPlaying;
  document.getElementById('btnPrev').disabled = !hasData;
  document.getElementById('btnNext').disabled = !hasData;
  document.getElementById('btnPrevStore').disabled = !hasData;
  document.getElementById('btnNextStore').disabled = !hasData;

  document.getElementById('btnPlay').textContent = isPaused ? '繼續' : '播放';
  document.getElementById('btnPause').textContent = isPaused ? '已暫停' : '暫停';
}

function updateNowPlaying(product, store, progress) {
  const el = document.getElementById('nowPlaying');
  if (!product && !store && !progress) {
    el.innerHTML = '<div class="idle-msg">請先貼上清單並按「解析清單」</div>';
    return;
  }
  el.innerHTML = `
    ${product ? `<div class="now-product">${product}</div>` : ''}
    ${store ? `<div class="now-store">${store}</div>` : ''}
    ${progress ? `<div class="now-progress">${progress}</div>` : ''}
  `;
}

// ===== 語音辨識 =====
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.lang = 'zh-TW';
  rec.continuous = true;
  rec.interimResults = false;

  rec.onresult = (e) => {
    const last = e.results[e.results.length - 1];
    if (!last.isFinal) return;
    const text = last[0].transcript.trim();
    document.getElementById('voiceStatus').textContent = `聽到：「${text}」`;

    // 指令判斷
    if (/停|暫停|等等|等一下/.test(text)) {
      if (isPlaying && !isPaused) togglePause();
    } else if (/繼續|開始|播放|好了/.test(text)) {
      if (isPaused) togglePause();
      else if (!isPlaying && parsedItems.length > 0) startPlay();
    } else if (/下一個|下一項|跳過|next/.test(text)) {
      skipProduct(1);
    } else if (/上一個|上一項|回去/.test(text)) {
      skipProduct(-1);
    } else if (/下一店|下一間/.test(text)) {
      skipStore(1);
    } else if (/上一店|上一間|重來|再說一次|再念一次/.test(text)) {
      skipStore(0); // 0 = 重念當前店
    } else if (/停止|結束|關掉/.test(text)) {
      stopPlay();
    }
  };

  rec.onend = () => {
    // 自動重新啟動（如果還在監聽模式）
    if (isListening) {
      try { rec.start(); } catch(e) {}
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      document.getElementById('voiceStatus').textContent = '麥克風權限被拒絕';
      isListening = false;
      document.getElementById('micBtn').classList.remove('listening');
    }
  };

  return rec;
}

function toggleMic() {
  if (!recognition) {
    recognition = initRecognition();
    if (!recognition) {
      document.getElementById('voiceStatus').textContent = '此瀏覽器不支援語音辨識';
      return;
    }
  }

  if (isListening) {
    isListening = false;
    recognition.stop();
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('voiceStatus').textContent = '語音控制已關閉';
  } else {
    isListening = true;
    recognition.start();
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('voiceStatus').textContent = '語音控制已開啟 - 說「停」「繼續」「下一個」';
  }
}
